name: Adquisicion CEN Diaria

# Endpoints lentos que cambian poco (CMG real, pronóstico demanda, solicitudes,
# maestro de unidades). Se sacaron del job horario para que no se pase del timeout.
on:
  schedule:
    - cron: "20 8 * * *"   # 08:20 UTC ≈ 04:20 Chile (fuera de horas punta)
  workflow_dispatch:

jobs:
  adquirir:
    name: Adquisición diaria (lentos)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v5

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Adquisicion_diaria.py
        env:
          CEN_USER_KEY: ${{ secrets.CEN_USER_KEY }}
          CEN_OPS_KEY:  ${{ secrets.CEN_OPS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 Adquisicion_diaria.py

      - name: Subir log como artefacto
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: log-adquisicion-diaria-${{ github.run_id }}
          path: adquisicion.log
          retention-days: 7
