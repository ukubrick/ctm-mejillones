name: Adquisicion CEN Horaria

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  adquirir:
    name: Consulta API CEN y guarda en DB
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar adquisicion.py
        env:
          CEN_USER_KEY: ${{ secrets.CEN_USER_KEY }}
          CEN_OPS_KEY:  ${{ secrets.CEN_OPS_KEY }}
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
        run: python3 Adquisicion.py

      - name: Subir log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-adquisicion-${{ github.run_id }}
          path: adquisicion.log
          retention-days: 7